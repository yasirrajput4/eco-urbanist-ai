services:
  # ── Express Node.js Backend ────────────────────────────────
  - type: web
    name: eco-urbanist-express
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: PORT
        value: 3000
      - key: MONGO_URI
        sync: false   # Set this manually in Render dashboard (sensitive)
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard (sensitive)
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FASTAPI_URL
        value: https://eco-urbanist-ai-v1.onrender.com  # Your existing FastAPI service
      - key: FRONTEND_URL
        value: https://your-frontend.onrender.com       # Your React frontend URL
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 100
      - key: PREDICTIONS_PER_DAY
        value: 5
