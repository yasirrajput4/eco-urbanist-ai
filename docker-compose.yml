version: "3.9"

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: eco-urbanist-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: eco-urbanist
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Express API (Node.js Middleware)
  express-api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: eco-urbanist-express
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:5173
      - MONGO_URI=mongodb://root:password@mongodb:27017/eco-urbanist?authSource=admin
      - JWT_SECRET=your_super_secret_jwt_key_change_this_in_production_use_32_random_chars
      - JWT_EXPIRES_IN=7d
      - FASTAPI_URL=http://fastapi:8000
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=100
      - PREDICTIONS_PER_DAY=5
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/api/src:/app/src
    command: npm run dev

  # FastAPI (Python AI Service)
  fastapi:
    build:
      context: ./backend/ai
      dockerfile: Dockerfile
    container_name: eco-urbanist-fastapi
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/ai/app:/app/app
      - ./backend/ai/models:/app/models
    command: python main.py

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eco-urbanist-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - express-api

volumes:
  mongodb_data:

networks:
  default:
    name: eco-urbanist-network
